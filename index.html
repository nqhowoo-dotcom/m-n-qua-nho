<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Anh Yêu Em</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.container {
  text-align: center;
  animation: zoomIn 2s ease forwards;
  opacity: 0;
}

h1 {
  font-size: 60px;
  color: white;
  text-shadow: 0 0 20px rgba(255,255,255,0.8);
}

@keyframes zoomIn {
  0% {
    transform: scale(0.2);
    opacity: 0;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}
</style>
</head>
<body>

<div class="container">
  <h1>Anh Yêu Em ❤️</h1>
</div>

</body>
</html>
